<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church M&E Committee System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { font-family: system-ui, sans-serif; }
  body { background: #f0f4f8; }
  .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Church M&E Committee</h1>
    <select id="loginUser" class="w-full p-2 border rounded mb-3">
      <option value="">-- Choose your name --</option>
    </select>
    <input type="password" id="loginPassword" placeholder="Password" class="w-full p-2 border rounded mb-3">
    <button onclick="login()" class="w-full bg-indigo-600 text-white p-2 rounded font-semibold">Sign In</button>
    <p id="loginError" class="text-red-500 text-sm text-center hidden mt-2"></p>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" style="display:none;">
  <div class="bg-white shadow-sm px-4 py-3 flex justify-between items-center">
    <h1 class="font-bold">M&E Committee</h1>
    <div>
      <span id="welcomeMsg" class="text-sm text-gray-600 mr-3"></span>
      <button onclick="logout()" class="bg-gray-200 px-3 py-1 rounded">Logout</button>
    </div>
  </div>

  <!-- Admin View -->
  <div id="adminView" style="display:none;" class="max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl p-6">
      <div class="flex gap-2 mb-4">
        <button onclick="showTab('members')" id="btnMembers" class="px-4 py-2 bg-indigo-600 text-white rounded">Members</button>
        <button onclick="showTab('upload')" id="btnUpload" class="px-4 py-2 bg-gray-300 rounded">Upload</button>
        <button onclick="showTab('reports')" id="btnReports" class="px-4 py-2 bg-gray-300 rounded">Reports</button>
      </div>

      <!-- Members Tab -->
      <div id="membersTab">
        <button onclick="openAddModal()" class="bg-indigo-600 text-white px-4 py-2 rounded mb-4">+ Add Member</button>
        <div id="membersList"></div>
      </div>

      <!-- Upload Tab -->
      <div id="uploadTab" style="display:none;">
        <p class="mb-2 text-sm text-gray-600">CSV format: Name, Phone, Email</p>
        <input type="file" id="csvFile" accept=".csv" class="mb-2">
        <button onclick="uploadContacts()" class="bg-indigo-600 text-white px-4 py-2 rounded">Upload & Distribute</button>
      </div>

      <!-- Reports Tab -->
      <div id="reportsTab" style="display:none;">
        <button onclick="downloadReport()" class="bg-green-600 text-white px-4 py-2 rounded">Download Excel Report</button>
      </div>
    </div>
  </div>

  <!-- Member View -->
  <div id="memberView" style="display:none;" class="max-w-4xl mx-auto px-4 py-6">
    <div id="memberContacts" class="bg-white rounded-xl"></div>
  </div>
</div>

<!-- Add Member Modal WITH ROLE TOGGLE -->
<div id="addModal" style="display:none;" class="fixed inset-0 modal-overlay flex items-center justify-center p-4">
  <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h3 class="text-lg font-bold mb-4">Add New Member</h3>
    <input type="text" id="newName" placeholder="Full Name" class="w-full p-2 border rounded mb-2">
    <input type="email" id="newEmail" placeholder="Email" class="w-full p-2 border rounded mb-2">
    <input type="text" id="newPhone" placeholder="Phone" class="w-full p-2 border rounded mb-2">
    <input type="password" id="newPassword" placeholder="Password" class="w-full p-2 border rounded mb-2">
    
    <!-- ROLE TOGGLE - Member or Admin -->
    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
    <select id="newRole" class="w-full p-2 border rounded mb-4">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>
    
    <div class="flex gap-2">
      <button onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded">Cancel</button>
      <button onclick="addMember()" class="flex-1 bg-indigo-600 text-white py-2 rounded">Add Member</button>
    </div>
  </div>
</div>

<script>
// Supabase configuration
const supabaseUrl = 'https://igugnnoqfelotyhawtat.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlndWdubm9xZmVsb3R5aGF3dGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDYyMDYsImV4cCI6MjA5NTcyMjIwNn0._vh0a8dJHNVNqF-wrVq7ULSz6eQnt1zU4WOyDcnYwW8';
const db = supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;

// Get all users
async function getUsers() {
  const { data } = await db.from('users').select('*');
  return data || [];
}

// Load login dropdown
async function loadLoginDropdown() {
  const users = await getUsers();
  const select = document.getElementById('loginUser');
  select.innerHTML = '<option value="">-- Choose your name --</option>';
  users.forEach(u => {
    select.innerHTML += `<option value="${u.id}">${u.name} (${u.role})</option>`;
  });
}

// Login function
window.login = async function() {
  const userId = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPassword').value;
  const users = await getUsers();
  const user = users.find(u => u.id === userId);
  
  if (!user || user.password !== password) {
    document.getElementById('loginError').classList.remove('hidden');
    return;
  }
  
  document.getElementById('loginError').classList.add('hidden');
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('welcomeMsg').innerText = user.name;
  
  if (user.role === 'admin') {
    document.getElementById('adminView').style.display = 'block';
    document.getElementById('memberView').style.display = 'none';
    await loadAdminPanel();
  } else {
    document.getElementById('adminView').style.display = 'none';
    document.getElementById('memberView').style.display = 'block';
    await loadMemberPanel();
  }
};

// Logout function
window.logout = function() {
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginPassword').value = '';
  loadLoginDropdown();
};

// Load admin panel
async function loadAdminPanel() {
  const users = await getUsers();
  const container = document.getElementById('membersList');
  container.innerHTML = '';
  
  for (const user of users) {
    const div = document.createElement('div');
    div.className = 'flex justify-between items-center bg-gray-50 p-3 rounded mb-2';
    div.innerHTML = `
      <div>
        <b>${user.name}</b><br>
        <small>${user.email || 'No email'} | Role: ${user.role}</small>
      </div>
      ${user.role !== 'admin' ? `<button onclick="deleteMember('${user.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>` : '<span class="text-gray-400 text-sm">Admin</span>'}
    `;
    container.appendChild(div);
  }
}

// Load member panel
async function loadMemberPanel() {
  const { data: contacts } = await db.from('contacts').select('*').eq('assigned_to', currentUser.id);
  const container = document.getElementById('memberContacts');
  
  if (!contacts || contacts.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-gray-400">No contacts assigned yet</div>';
    return;
  }
  
  container.innerHTML = '';
  for (const c of contacts) {
    container.innerHTML += `
      <div class="p-4 border-b">
        <p><b>${c.name}</b></p>
        <p>📞 ${c.phone}</p>
        ${c.email ? `<p>✉️ ${c.email}</p>` : ''}
        <p class="text-sm mt-1">Status: ${c.status === 'completed' ? '✅ Completed' : '⏳ Pending'}</p>
        <a href="tel:${c.phone}" class="inline-block mt-2 bg-green-600 text-white px-3 py-1 rounded text-sm">Call</a>
      </div>
    `;
  }
}

// Open add member modal
window.openAddModal = function() {
  document.getElementById('addModal').style.display = 'flex';
  document.getElementById('newName').value = '';
  document.getElementById('newEmail').value = '';
  document.getElementById('newPhone').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newRole').value = 'member';
};

// Close modal
window.closeModal = function() {
  document.getElementById('addModal').style.display = 'none';
};

// Add member WITH ROLE TOGGLE
window.addMember = async function() {
  const name = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  const password = document.getElementById('newPassword').value.trim();
  const role = document.getElementById('newRole').value;
  
  if (!name || !password) {
    alert('Name and password are required');
    return;
  }
  
  const { error } = await db.from('users').insert([{
    name: name,
    email: email,
    phone: phone,
    role: role,
    password: password
  }]);
  
  if (error) {
    alert('Error: ' + error.message);
    return;
  }
  
  closeModal();
  await loadAdminPanel();
  await loadLoginDropdown();
  alert(`✅ ${role === 'admin' ? 'Admin' : 'Member'} "${name}" added successfully`);
};

// DELETE MEMBER - WORKS
window.deleteMember = async function(userId) {
  if (!confirm('⚠️ Are you sure you want to delete this member permanently?')) {
    return;
  }
  
  // First, unassign any contacts from this member
  await db.from('contacts').update({ assigned_to: null }).eq('assigned_to', userId);
  
  // Then delete the member
  const { error } = await db.from('users').delete().eq('id', userId);
  
  if (error) {
    alert('Error deleting member: ' + error.message);
  } else {
    alert('✅ Member deleted successfully');
    await loadAdminPanel();
    await loadLoginDropdown();
  }
};

// Upload contacts
window.uploadContacts = async function() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) {
    alert('Please select a CSV file');
    return;
  }
  
  const users = await getUsers();
  const members = users.filter(u => u.role === 'member');
  
  if (members.length === 0) {
    alert('No members found. Please add members first.');
    return;
  }
  
  const text = await file.text();
  const lines = text.split('\n');
  let imported = 0;
  
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length >= 2 && cols[0].trim() && cols[1].trim()) {
      const member = members[imported % members.length];
      await db.from('contacts').insert([{
        name: cols[0].trim(),
        phone: cols[1].trim(),
        email: cols[2]?.trim() || '',
        assigned_to: member.id,
        status: 'pending'
      }]);
      imported++;
    }
  }
  
  alert(`✅ Imported ${imported} contacts and distributed to ${members.length} members`);
  document.getElementById('csvFile').value = '';
  await loadAdminPanel();
};

// Download report
window.downloadReport = async function() {
  const users = await getUsers();
  const { data: contacts } = await db.from('contacts').select('*');
  
  const reportData = [
    ['Church M&E Committee Report'],
    ['Generated: ' + new Date().toLocaleString()],
    [],
    ['Contact Name', 'Phone', 'Email', 'Assigned To', 'Status', 'Feedback']
  ];
  
  for (const c of contacts || []) {
    const user = users.find(u => u.id === c.assigned_to);
    reportData.push([
      c.name,
      c.phone,
      c.email || '',
      user?.name || 'Unassigned',
      c.status,
      c.feedback || ''
    ]);
  }
  
  const ws = XLSX.utils.aoa_to_sheet(reportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Contacts Report');
  XLSX.writeFile(wb, `ME_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
};

// Show tab
window.showTab = function(tab) {
  document.getElementById('membersTab').style.display = 'none';
  document.getElementById('uploadTab').style.display = 'none';
  document.getElementById('reportsTab').style.display = 'none';
  document.getElementById(`${tab}Tab`).style.display = 'block';
  
  document.getElementById('btnMembers').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById('btnUpload').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById('btnReports').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById(`btn${tab.charAt(0).toUpperCase() + tab.slice(1)}`).className = 'px-4 py-2 bg-indigo-600 text-white rounded';
};

// Initialize
loadLoginDropdown();
</script>
</body>
</html>

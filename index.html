<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church M&E Committee System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { font-family: system-ui, sans-serif; }
  body { background: #f0f4f8; }
  .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-4">Church M&E Committee</h1>
    <select id="loginUser" class="w-full px-4 py-3 border rounded-lg mb-3">
      <option value="">-- Choose your name --</option>
    </select>
    <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-lg mb-3">
    <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-lg">Sign In</button>
    <p id="loginError" class="text-red-500 text-sm text-center hidden mt-2"></p>
  </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden">
  <div class="bg-white shadow-sm px-4 py-3 flex justify-between">
    <h1 class="font-bold">M&E Committee</h1>
    <button onclick="logout()" class="bg-gray-100 px-3 py-1 rounded">Logout</button>
  </div>

  <!-- Admin View -->
  <div id="adminView" class="hidden max-w-6xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl p-6">
      <div class="flex gap-2 mb-4">
        <button onclick="showTab('members')" id="btnMembers" class="px-4 py-2 bg-indigo-600 text-white rounded">Members</button>
        <button onclick="showTab('upload')" id="btnUpload" class="px-4 py-2 bg-gray-300 rounded">Upload</button>
        <button onclick="showTab('reports')" id="btnReports" class="px-4 py-2 bg-gray-300 rounded">Reports</button>
      </div>

      <!-- Members Tab -->
      <div id="membersTab">
        <button onclick="openAddMemberModal()" class="bg-indigo-600 text-white px-4 py-2 rounded mb-4">+ Add Member</button>
        <div id="membersList"></div>
      </div>

      <!-- Upload Tab -->
      <div id="uploadTab" class="hidden">
        <input type="file" id="csvFile" accept=".csv" class="mb-2">
        <button onclick="uploadContacts()" class="bg-indigo-600 text-white px-4 py-2 rounded">Upload & Distribute</button>
      </div>

      <!-- Reports Tab -->
      <div id="reportsTab" class="hidden">
        <button onclick="downloadReport()" class="bg-green-600 text-white px-4 py-2 rounded">Download Excel Report</button>
      </div>
    </div>
  </div>

  <!-- Member View -->
  <div id="memberView" class="hidden max-w-4xl mx-auto px-4 py-6">
    <div id="memberContacts" class="bg-white rounded-xl"></div>
  </div>
</div>

<!-- Add Member Modal -->
<div id="addMemberModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4">
  <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h3 class="text-lg font-bold mb-4">Add Member</h3>
    <input type="text" id="memberName" placeholder="Name" class="w-full px-3 py-2 border rounded mb-2">
    <input type="email" id="memberEmail" placeholder="Email" class="w-full px-3 py-2 border rounded mb-2">
    <input type="text" id="memberPhone" placeholder="Phone" class="w-full px-3 py-2 border rounded mb-2">
    <input type="password" id="memberPassword" placeholder="Password" class="w-full px-3 py-2 border rounded mb-4">
    <div class="flex gap-2">
      <button onclick="closeAddMemberModal()" class="flex-1 bg-gray-200 py-2 rounded">Cancel</button>
      <button onclick="addMember()" class="flex-1 bg-indigo-600 text-white py-2 rounded">Add</button>
    </div>
  </div>
</div>

<script>
// Supabase setup - SINGLE instance
const supabaseUrl = 'https://igugnnoqfelotyhawtat.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlndWdubm9xZmVsb3R5aGF3dGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDYyMDYsImV4cCI6MjA5NTcyMjIwNn0._vh0a8dJHNVNqF-wrVq7ULSz6eQnt1zU4WOyDcnYwW8';
const db = supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;

// Load users
async function getUsers() {
  const { data } = await db.from('users').select('*');
  return data || [];
}

// Load dropdown
async function loadLoginDropdown() {
  const users = await getUsers();
  const select = document.getElementById('loginUser');
  select.innerHTML = '<option value="">-- Choose your name --</option>';
  users.forEach(u => {
    select.innerHTML += `<option value="${u.id}">${u.name}</option>`;
  });
}

// Login
window.login = async function() {
  const userId = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPassword').value;
  const users = await getUsers();
  const user = users.find(u => u.id === userId);
  
  if (!user || user.password !== password) {
    document.getElementById('loginError').classList.remove('hidden');
    return;
  }
  
  document.getElementById('loginError').classList.add('hidden');
  currentUser = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  
  if (user.role === 'admin') {
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('memberView').classList.add('hidden');
    await loadAdminDashboard();
  } else {
    document.getElementById('adminView').classList.add('hidden');
    document.getElementById('memberView').classList.remove('hidden');
    await loadMemberDashboard();
  }
};

// Logout
window.logout = function() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginPassword').value = '';
  loadLoginDropdown();
};

// Load Admin Dashboard
async function loadAdminDashboard() {
  const users = await getUsers();
  const members = users.filter(u => u.role === 'member');
  document.getElementById('statMembers').innerText = members.length;
  
  const { data: contacts } = await db.from('contacts').select('*');
  document.getElementById('statContacts').innerText = contacts?.length || 0;
  
  // Render members list
  const container = document.getElementById('membersList');
  container.innerHTML = '';
  for (const user of users) {
    const div = document.createElement('div');
    div.className = 'flex justify-between items-center bg-gray-50 p-3 rounded mb-2';
    div.innerHTML = `
      <div><b>${user.name}</b><br><small>${user.email || 'No email'}</small></div>
      ${user.role !== 'admin' ? `<button onclick="deleteMember('${user.id}')" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Delete</button>` : '<span class="text-gray-400">Admin</span>'}
    `;
    container.appendChild(div);
  }
}

// Load Member Dashboard
async function loadMemberDashboard() {
  const { data: contacts } = await db.from('contacts').select('*').eq('assigned_to', currentUser.id);
  const container = document.getElementById('memberContacts');
  
  if (!contacts || contacts.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-gray-400">No contacts assigned</div>';
    return;
  }
  
  container.innerHTML = '';
  for (const c of contacts) {
    const div = document.createElement('div');
    div.className = 'p-4 border-b';
    div.innerHTML = `
      <p><b>${c.name}</b></p>
      <p>📞 ${c.phone}</p>
      <p class="text-sm mt-1">Status: ${c.status === 'completed' ? '✅ Done' : '⏳ Pending'}</p>
      <a href="tel:${c.phone}" class="inline-block mt-2 bg-green-600 text-white px-3 py-1 rounded text-sm">Call</a>
    `;
    container.appendChild(div);
  }
}

// Add Member Modal
window.openAddMemberModal = function() {
  document.getElementById('addMemberModal').classList.remove('hidden');
  document.getElementById('memberName').value = '';
  document.getElementById('memberEmail').value = '';
  document.getElementById('memberPhone').value = '';
  document.getElementById('memberPassword').value = '';
};

window.closeAddMemberModal = function() {
  document.getElementById('addMemberModal').classList.add('hidden');
};

// Add Member
window.addMember = async function() {
  const name = document.getElementById('memberName').value.trim();
  const email = document.getElementById('memberEmail').value.trim();
  const phone = document.getElementById('memberPhone').value.trim();
  const password = document.getElementById('memberPassword').value.trim();
  
  if (!name || !password) {
    alert('Name and password required');
    return;
  }
  
  const { error } = await db.from('users').insert([{ name, email, phone, role: 'member', password }]);
  if (error) {
    alert('Error: ' + error.message);
    return;
  }
  
  closeAddMemberModal();
  await loadAdminDashboard();
  await loadLoginDropdown();
  alert('Member added successfully');
};

// Delete Member - THIS WORKS NOW
window.deleteMember = async function(userId) {
  if (!confirm('Are you sure you want to delete this member?')) return;
  
  // First, unassign contacts
  await db.from('contacts').update({ assigned_to: null }).eq('assigned_to', userId);
  
  // Then delete the member
  const { error } = await db.from('users').delete().eq('id', userId);
  
  if (error) {
    alert('Error deleting member: ' + error.message);
    return;
  }
  
  await loadAdminDashboard();
  await loadLoginDropdown();
  alert('Member deleted successfully');
};

// Upload Contacts
window.uploadContacts = async function() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) {
    alert('Select a CSV file');
    return;
  }
  
  const users = await getUsers();
  const members = users.filter(u => u.role === 'member');
  
  if (members.length === 0) {
    alert('No members found. Add members first.');
    return;
  }
  
  const text = await file.text();
  const lines = text.split('\n');
  let imported = 0;
  
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length >= 2 && cols[0].trim()) {
      const member = members[imported % members.length];
      await db.from('contacts').insert([{
        name: cols[0].trim(),
        phone: cols[1].trim(),
        email: cols[2]?.trim() || '',
        assigned_to: member.id,
        status: 'pending'
      }]);
      imported++;
    }
  }
  
  alert(`✅ Imported ${imported} contacts to ${members.length} members`);
  document.getElementById('csvFile').value = '';
  await loadAdminDashboard();
};

// Download Report
window.downloadReport = async function() {
  const users = await getUsers();
  const { data: contacts } = await db.from('contacts').select('*');
  
  const reportData = [['Name', 'Phone', 'Email', 'Assigned To', 'Status']];
  for (const c of contacts || []) {
    const user = users.find(u => u.id === c.assigned_to);
    reportData.push([c.name, c.phone, c.email || '', user?.name || 'Unknown', c.status]);
  }
  
  const ws = XLSX.utils.aoa_to_sheet(reportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Contacts');
  XLSX.writeFile(wb, `ME_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
};

// Show Tab
window.showTab = function(tab) {
  document.getElementById('membersTab').classList.add('hidden');
  document.getElementById('uploadTab').classList.add('hidden');
  document.getElementById('reportsTab').classList.add('hidden');
  document.getElementById(`${tab}Tab`).classList.remove('hidden');
  
  document.getElementById('btnMembers').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById('btnUpload').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById('btnReports').className = 'px-4 py-2 bg-gray-300 rounded';
  document.getElementById(`btn${tab.charAt(0).toUpperCase() + tab.slice(1)}`).className = 'px-4 py-2 bg-indigo-600 text-white rounded';
};

// Initialize
loadLoginDropdown();
</script>
</body>
</html>

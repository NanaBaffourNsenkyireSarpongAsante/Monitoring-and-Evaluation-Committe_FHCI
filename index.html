<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church M&E Committee System</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { font-family: system-ui, -apple-system, sans-serif; }
  body { background: #f0f4f8; }
  .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
</style>
</head>
<body class="min-h-screen">

<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Church M&E Committee</h1>
      <p class="text-gray-500 mt-1">Monitoring & Evaluation System</p>
    </div>
    <div class="space-y-4">
      <select id="loginUser" class="w-full px-4 py-3 border rounded-lg">
        <option value="">-- Choose your name --</option>
      </select>
      <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-lg">
      <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold">Sign In</button>
      <p id="loginError" class="text-red-500 text-sm text-center hidden"></p>
    </div>
  </div>
</div>

<div id="mainApp" class="hidden min-h-screen">
  <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center">
    <h1 class="font-bold">M&E Committee</h1>
    <button onclick="logout()" class="bg-gray-100 px-3 py-2 rounded-lg">Logout</button>
  </header>

  <div id="adminView" class="hidden max-w-6xl mx-auto px-4 py-6">
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-4 rounded-xl"><div class="text-2xl font-bold text-indigo-600" id="statMembers">0</div><div>Members</div></div>
      <div class="bg-white p-4 rounded-xl"><div class="text-2xl font-bold text-blue-600" id="statContacts">0</div><div>Contacts</div></div>
    </div>

    <div class="bg-white rounded-xl">
      <div class="flex border-b">
        <button onclick="showTab('members')" class="px-4 py-2 text-indigo-600 border-b-2 border-indigo-600">Members</button>
        <button onclick="showTab('upload')" class="px-4 py-2 text-gray-500">Upload</button>
        <button onclick="showTab('reports')" class="px-4 py-2 text-gray-500">Reports</button>
      </div>

      <div id="membersTab" class="p-4">
        <button onclick="showAddMember()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg mb-4">+ Add Member</button>
        <div id="membersList"></div>
      </div>

      <div id="uploadTab" class="hidden p-4">
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="uploadContacts()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg mt-2">Upload</button>
      </div>

      <div id="reportsTab" class="hidden p-4">
        <button onclick="downloadReport()" class="bg-green-600 text-white px-4 py-2 rounded-lg">Download Report</button>
      </div>
    </div>
  </div>

  <div id="memberView" class="hidden max-w-4xl mx-auto px-4 py-6">
    <div id="memberContacts" class="bg-white rounded-xl divide-y"></div>
  </div>
</div>

<div id="addModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4">
  <div class="bg-white rounded-xl p-6 w-full max-w-md">
    <h3 class="text-lg font-bold mb-4">Add Member</h3>
    <input type="text" id="newName" placeholder="Name" class="w-full px-3 py-2 border rounded-lg mb-3">
    <input type="email" id="newEmail" placeholder="Email" class="w-full px-3 py-2 border rounded-lg mb-3">
    <input type="text" id="newPhone" placeholder="Phone" class="w-full px-3 py-2 border rounded-lg mb-3">
    <input type="password" id="newPassword" placeholder="Password" class="w-full px-3 py-2 border rounded-lg mb-3">
    <div class="flex gap-2">
      <button onclick="closeModal()" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button>
      <button onclick="addMember()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg">Add</button>
    </div>
  </div>
</div>

<script>
const supabase = supabase.createClient(
  'https://igugnnoqfelotyhawtat.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlndWdubm9xZmVsb3R5aGF3dGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDYyMDYsImV4cCI6MjA5NTcyMjIwNn0._vh0a8dJHNVNqF-wrVq7ULSz6eQnt1zU4WOyDcnYwW8'
);

let currentUser = null;

async function loadUsers() {
  const { data } = await supabase.from('users').select('*');
  return data || [];
}

async function loadDropdown() {
  const users = await loadUsers();
  const select = document.getElementById('loginUser');
  select.innerHTML = '<option value="">-- Choose your name --</option>';
  users.forEach(u => {
    select.innerHTML += `<option value="${u.id}">${u.name}</option>`;
  });
}

async function login() {
  const userId = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPassword').value;
  const users = await loadUsers();
  const user = users.find(u => u.id === userId);
  
  if (!user || user.password !== password) {
    document.getElementById('loginError').classList.remove('hidden');
    return;
  }
  
  document.getElementById('loginError').classList.add('hidden');
  currentUser = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  
  if (user.role === 'admin') {
    document.getElementById('adminView').classList.remove('hidden');
    document.getElementById('memberView').classList.add('hidden');
    await refreshAdmin();
  } else {
    document.getElementById('adminView').classList.add('hidden');
    document.getElementById('memberView').classList.remove('hidden');
    await refreshMember();
  }
}

async function logout() {
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginPassword').value = '';
  loadDropdown();
}

async function refreshAdmin() {
  const users = await loadUsers();
  const { data: contacts } = await supabase.from('contacts').select('*');
  
  document.getElementById('statMembers').textContent = users.filter(u => u.role === 'member').length;
  document.getElementById('statContacts').textContent = contacts?.length || 0;
  
  const container = document.getElementById('membersList');
  container.innerHTML = users.map(u => `
    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg mb-2">
      <div><b>${u.name}</b><br><small>${u.email || 'No email'}</small></div>
      ${u.role !== 'admin' ? `<button onclick="removeMember('${u.id}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm">Remove</button>` : '<span class="text-gray-400">Admin</span>'}
    </div>
  `).join('');
}

async function refreshMember() {
  const { data: contacts } = await supabase.from('contacts').select('*').eq('assigned_to', currentUser.id);
  const container = document.getElementById('memberContacts');
  
  if (!contacts || contacts.length === 0) {
    container.innerHTML = '<div class="p-8 text-center text-gray-400">No contacts assigned</div>';
    return;
  }
  
  container.innerHTML = contacts.map(c => `
    <div class="p-4 border-b">
      <p><b>${c.name}</b></p>
      <p>📞 ${c.phone}</p>
      <p class="text-sm mt-1">Status: ${c.status === 'completed' ? '✅ Done' : '⏳ Pending'}</p>
      <a href="tel:${c.phone}" class="inline-block mt-2 bg-green-600 text-white px-3 py-1 rounded-lg text-sm">Call</a>
    </div>
  `).join('');
}

function showAddMember() {
  document.getElementById('addModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('addModal').classList.add('hidden');
}

async function addMember() {
  const name = document.getElementById('newName').value;
  const email = document.getElementById('newEmail').value;
  const phone = document.getElementById('newPhone').value;
  const password = document.getElementById('newPassword').value;
  
  if (!name || !password) {
    alert('Name and password required');
    return;
  }
  
  await supabase.from('users').insert([{ name, email, phone, role: 'member', password }]);
  closeModal();
  await refreshAdmin();
  await loadDropdown();
  alert('Member added');
}

async function removeMember(id) {
  if (!confirm('Remove this member?')) return;
  await supabase.from('users').delete().eq('id', id);
  await refreshAdmin();
  await loadDropdown();
}

async function uploadContacts() {
  const file = document.getElementById('csvFile').files[0];
  if (!file) return alert('Select a CSV file');
  
  const users = await loadUsers();
  const members = users.filter(u => u.role === 'member');
  if (members.length === 0) return alert('No members found');
  
  const text = await file.text();
  const lines = text.split('\n').slice(1);
  
  for (let i = 0; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols[0] && cols[1]) {
      const member = members[i % members.length];
      await supabase.from('contacts').insert([{
        name: cols[0].trim(),
        phone: cols[1].trim(),
        email: cols[2]?.trim() || '',
        assigned_to: member.id,
        status: 'pending'
      }]);
    }
  }
  
  alert('Contacts uploaded');
  await refreshAdmin();
}

async function downloadReport() {
  const users = await loadUsers();
  const { data: contacts } = await supabase.from('contacts').select('*');
  
  const data = [['Name', 'Phone', 'Email', 'Assigned To', 'Status']];
  for (const c of contacts || []) {
    const user = users.find(u => u.id === c.assigned_to);
    data.push([c.name, c.phone, c.email || '', user?.name || 'Unknown', c.status]);
  }
  
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Contacts');
  XLSX.writeFile(wb, `report_${new Date().toISOString().split('T')[0]}.xlsx`);
}

function showTab(tab) {
  document.getElementById('membersTab').classList.add('hidden');
  document.getElementById('uploadTab').classList.add('hidden');
  document.getElementById('reportsTab').classList.add('hidden');
  document.getElementById(`${tab}Tab`).classList.remove('hidden');
}

loadDropdown();
</script>
</body>
</html>
